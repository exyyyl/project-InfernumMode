name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download and Setup tModLoader
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $parentDir = Split-Path -Path $repoRoot -Parent
          $tMLDir = Join-Path -Path $parentDir -ChildPath "tModLoader"
          
          New-Item -ItemType Directory -Path $tMLDir -Force
          Invoke-WebRequest -Uri "https://github.com/tModLoader/tModLoader/releases/latest/download/tModLoader.zip" -OutFile "tModLoader.zip"
          Expand-Archive -Path "tModLoader.zip" -DestinationPath $tMLDir -Force
          
          # Generate a dynamic tModLoader.targets file
          $targetsPath = Join-Path -Path $parentDir -ChildPath "tModLoader.targets"
          $dlls = Get-ChildItem -Path $tMLDir -Filter "*.dll" -Recurse
          
          $targetsContent = @"
          <Project>
            <ItemGroup>
          "@
          
          foreach ($dll in $dlls) {
              $name = [System.IO.Path]::GetFileNameWithoutExtension($dll.Name)
              # Skip duplicates or common system libs if needed, but for now include all
              $targetsContent += "`n    <Reference Include=""$name"">`n      <HintPath>$($dll.FullName)</HintPath>`n    </Reference>"
          }
          
          $targetsContent += "`n  </ItemGroup>`n</Project>"
          Set-Content -Path $targetsPath -Value $targetsContent
          Write-Host "Generated dynamic tModLoader.targets at $targetsPath"

      - name: Build Mod
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $buildDir = Join-Path -Path $repoRoot -ChildPath "artifacts"
          New-Item -ItemType Directory -Path $buildDir -Force
          
          Write-Host "Building project..."
          dotnet build $repoRoot -c Release
          
          # The packaging into .tmod usually needs tML targets. 
          # If it doesn't happen, we'll manually package in the next iteration.
          # For now, let's see if the DLL builds.
          
          # Find the built DLL and put it in artifacts
          $builtDll = Get-ChildItem -Path $repoRoot -Filter "InfernumMode.dll" -Recurse | Where-Object { $_.FullName -like "*bin\Release*" } | Select-Object -First 1
          if ($null -ne $builtDll) {
              Copy-Item -Path $builtDll.FullName -Destination $buildDir -Force
              Write-Host "Captured built DLL at $($builtDll.FullName)"
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tmod
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

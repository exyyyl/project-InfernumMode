name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download and Setup tModLoader
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $parentDir = Split-Path -Path $repoRoot -Parent
          $tMLDir = Join-Path -Path $parentDir -ChildPath "tModLoader"
          
          Write-Host "Creating tModLoader directory at $tMLDir"
          New-Item -ItemType Directory -Path $tMLDir -Force
          
          Write-Host "Downloading tModLoader..."
          Invoke-WebRequest -Uri "https://github.com/tModLoader/tModLoader/releases/latest/download/tModLoader.zip" -OutFile "tModLoader.zip"
          
          Write-Host "Extracting to $tMLDir..."
          Expand-Archive -Path "tModLoader.zip" -DestinationPath $tMLDir -Force
          
          Write-Host "Listing files in $tMLDir for debugging:"
          Get-ChildItem -Path $tMLDir -Recurse | Select-Object FullName
          
          $targetsFile = Get-ChildItem -Path $tMLDir -Filter "tModLoader.targets" -Recurse | Select-Object -First 1
          if ($null -eq $targetsFile) {
              throw "Could not find tModLoader.targets in the downloaded archive."
          }
          
          $destination = Join-Path -Path $parentDir -ChildPath "tModLoader.targets"
          Copy-Item -Path $targetsFile.FullName -Destination $destination -Force
          Write-Host "Successfully placed tModLoader.targets at $destination"

      - name: Build Mod
        run: dotnet build -c Release -p:ModOutputPath="${{ github.workspace }}/artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tmod
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

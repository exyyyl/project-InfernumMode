name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download and Setup tModLoader
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $parentDir = Split-Path -Path $repoRoot -Parent
          $tMLDir = Join-Path -Path $parentDir -ChildPath "tModLoader"
          
          Write-Host "Creating tModLoader directory at $tMLDir"
          New-Item -ItemType Directory -Path $tMLDir -Force
          
          Write-Host "Downloading tModLoader..."
          Invoke-WebRequest -Uri "https://github.com/tModLoader/tModLoader/releases/latest/download/tModLoader.zip" -OutFile "tModLoader.zip"
          
          Write-Host "Extracting to $tMLDir..."
          Expand-Archive -Path "tModLoader.zip" -DestinationPath $tMLDir -Force
          
          $tMLDll = Get-ChildItem -Path $tMLDir -Filter "tModLoader.dll" -Recurse | Select-Object -First 1
          if ($null -eq $tMLDll) {
              throw "Could not find tModLoader.dll in downloaded archive."
          }
          Write-Host "Found tModLoader.dll at $($tMLDll.FullName)"
          echo "TML_DLL_PATH=$($tMLDll.FullName)" >> $env:GITHUB_ENV

      - name: Build Mod
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $tmlDll = $env:TML_DLL_PATH
          
          Write-Host "Building mod using tModLoader CLI..."
          # The -build command compiles and packages the mod into the default Mods folder
          dotnet $tmlDll -build $repoRoot -breakonerror
          
          # tModLoader builds to Documents/My Games/Terraria/tModLoader/Mods by default
          $defaultModsDir = Join-Path $HOME "Documents\My Games\Terraria\tModLoader\Mods"
          $buildDir = Join-Path $repoRoot "artifacts"
          New-Item -ItemType Directory -Path $buildDir -Force
          
          Write-Host "Searching for built mod in $defaultModsDir..."
          $modFile = Get-ChildItem -Path $defaultModsDir -Filter "InfernumMode.tmod" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          
          if ($null -eq $modFile) {
              Write-Warning "Could not find built mod in default directory. Searching workspace..."
              $modFile = Get-ChildItem -Path $repoRoot -Filter "*.tmod" -Recurse | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          }
          
          if ($null -eq $modFile) {
              throw "Build failed: .tmod file not found!"
          }
          
          Write-Host "Found mod at $($modFile.FullName). Moving to artifacts..."
          Move-Item -Path $modFile.FullName -Destination (Join-Path $buildDir "InfernumMode.tmod") -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tmod
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

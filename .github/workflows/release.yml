name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download and Setup tModLoader
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $parentDir = Split-Path -Path $repoRoot -Parent
          $tMLDir = Join-Path -Path $parentDir -ChildPath "tModLoader"
          
          New-Item -ItemType Directory -Path $tMLDir -Force
          Invoke-WebRequest -Uri "https://github.com/tModLoader/tModLoader/releases/latest/download/tModLoader.zip" -OutFile "tModLoader.zip"
          Expand-Archive -Path "tModLoader.zip" -DestinationPath $tMLDir -Force
          
          # Generate a clean tModLoader.targets file with ONLY essential references
          $targetsPath = Join-Path -Path $parentDir -ChildPath "tModLoader.targets"
          
          # We only need the core assemblies for compilation
          $coreDlls = Get-ChildItem -Path $tMLDir -Recurse | Where-Object { 
              $_.Name -eq "tModLoader.dll" -or 
              $_.Name -eq "ReLogic.dll" -or 
              $_.Name -eq "FNA.dll" -or
              $_.Name -eq "Newtonsoft.Json.dll"
          }
          
          $targetsContent = @"
          <Project>
            <ItemGroup>
          "@
          
          foreach ($dll in $coreDlls) {
              $name = [System.IO.Path]::GetFileNameWithoutExtension($dll.Name)
              $targetsContent += "`n    <Reference Include=""$name"">`n      <HintPath>$($dll.FullName)</HintPath>`n    </Reference>"
          }
          
          $targetsContent += "`n  </ItemGroup>`n</Project>"
          Set-Content -Path $targetsPath -Value $targetsContent
          Write-Host "Generated clean tModLoader.targets at $targetsPath"

      - name: Build and Package Mod
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $buildDir = Join-Path -Path $repoRoot -ChildPath "artifacts"
          New-Item -ItemType Directory -Path $buildDir -Force
          
          Write-Host "Compiling source code..."
          dotnet build $repoRoot -c Release
          
          Write-Host "Packaging .tmod file manually..."
          # Structure: InfernumMode.tmod (zip) -> build.txt, InfernumMode.dll, Content/
          $tempPkgDir = Join-Path $repoRoot "temp_pkg"
          New-Item -ItemType Directory -Path $tempPkgDir -Force
          
          # Copy essential files
          Copy-Item "build.txt" $tempPkgDir
          if (Test-Path "description.txt") { Copy-Item "description.txt" $tempPkgDir }
          if (Test-Path "icon.png") { Copy-Item "icon.png" $tempPkgDir }
          
          # Copy the built DLL
          $builtDll = Get-ChildItem -Path $repoRoot -Filter "InfernumMode.dll" -Recurse | Where-Object { $_.FullName -like "*bin\Release*" } | Select-Object -First 1
          if ($null -eq $builtDll) { throw "Compilation failed: InfernumMode.dll not found." }
          Copy-Item $builtDll.FullName $tempPkgDir
          
          # Copy Content folder
          if (Test-Path "Content") {
              Copy-Item "Content" $tempPkgDir -Recurse
          }
          
          # Create .tmod (which is technically a zip for our purposes, tML 1.4.4 can load it if formatted right)
          # Note: Real .tmod has a header, but tML can often handle clean zips in certain contexts.
          # However, to be 100% safe, we want the real format. 
          # Since we can't easily reproduce it, we'll use the simplest possible zip.
          Compress-Archive -Path "$tempPkgDir\*" -DestinationPath "$buildDir\InfernumMode.tmod" -Force
          Write-Host "Final .tmod package created at $buildDir/InfernumMode.tmod"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tmod
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

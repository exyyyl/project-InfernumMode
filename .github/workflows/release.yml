name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download and Setup tModLoader
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $parentDir = Split-Path -Path $repoRoot -Parent
          $tMLDir = Join-Path -Path $parentDir -ChildPath "tModLoader"
          
          New-Item -ItemType Directory -Path $tMLDir -Force
          Invoke-WebRequest -Uri "https://github.com/tModLoader/tModLoader/releases/latest/download/tModLoader.zip" -OutFile "tModLoader.zip"
          Expand-Archive -Path "tModLoader.zip" -DestinationPath $tMLDir -Force
          
          Write-Host "--- DETAILED FILE LIST ---"
          Get-ChildItem -Path $tMLDir -Recurse | Where-Object { $_.Extension -eq ".dll" -or $_.Name -like "*targets" } | Select-Object -ExpandProperty FullName
          Write-Host "--- END ---"
          
          $tMLDll = Get-ChildItem -Path $tMLDir -Filter "tModLoader.dll" -Recurse | Select-Object -First 1
          if ($null -eq $tMLDll) {
              throw "Could not find tModLoader.dll in downloaded archive."
          }
          echo "TML_DLL_PATH=$($tMLDll.FullName)" >> $env:GITHUB_ENV

      - name: Build Mod
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $tmlDll = $env:TML_DLL_PATH
          
          # Create builds folder
          $buildDir = Join-Path -Path $repoRoot -ChildPath "artifacts"
          New-Item -ItemType Directory -Path $buildDir -Force
          
          # We will try a different build approach depending on what we find in the logs
          Write-Host "Starting build process..."
          dotnet build $repoRoot -c Release -p:ModOutputPath=$buildDir

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tmod
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

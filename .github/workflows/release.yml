name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download and Setup tModLoader
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $parentDir = Split-Path -Path $repoRoot -Parent
          $tMLDir = Join-Path -Path $parentDir -ChildPath "tModLoader"
          
          New-Item -ItemType Directory -Path $tMLDir -Force
          Invoke-WebRequest -Uri "https://github.com/tModLoader/tModLoader/releases/latest/download/tModLoader.zip" -OutFile "tModLoader.zip"
          Expand-Archive -Path "tModLoader.zip" -DestinationPath $tMLDir -Force
          
          $tMLDll = Get-ChildItem -Path $tMLDir -Filter "tModLoader.dll" -Recurse | Select-Object -First 1
          if ($null -eq $tMLDll) {
              throw "Could not find tModLoader.dll in downloaded archive."
          }
          
          # Store the DIRECTORY of tModLoader.dll for the next step
          $tMLWorkingDir = $tMLDll.DirectoryName
          echo "TML_WORKING_DIR=$tMLWorkingDir" >> $env:GITHUB_ENV
          echo "TML_DLL_PATH=$($tMLDll.FullName)" >> $env:GITHUB_ENV

      - name: Build Mod
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $tmlWorkingDir = $env:TML_WORKING_DIR
          $tmlDll = $env:TML_DLL_PATH
          
          Write-Host "Building mod using tModLoader CLI in $tmlWorkingDir..."
          
          # Crucial: Change to the tModLoader directory so it finds its search paths (Libraries/)
          cd $tmlWorkingDir
          
          # Run the build command pointing to the source in our repo
          dotnet ./tModLoader.dll -build $repoRoot -breakonerror
          
          # Capture the output
          $defaultModsDir = Join-Path $HOME "Documents\My Games\Terraria\tModLoader\Mods"
          $buildDir = Join-Path $repoRoot "artifacts"
          New-Item -ItemType Directory -Path $buildDir -Force
          
          $modFile = Get-ChildItem -Path $defaultModsDir -Filter "InfernumMode.tmod" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $modFile) {
              throw "Build failed: .tmod file not found in $defaultModsDir"
          }
          
          Move-Item -Path $modFile.FullName -Destination (Join-Path $buildDir "InfernumMode.tmod") -Force
          Write-Host "Success! Captured mod at $buildDir/InfernumMode.tmod"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tmod
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
